<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TreinoFlow - Elite Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #F8FAFC; color: #1E293B; font-family: 'Inter', sans-serif; }
        .bg-gelo { background-color: #F1F5F9; }
        .card { background: white; border-radius: 20px; border: 1px solid #E2E8F0; transition: transform 0.2s; }
        .sidebar-item { cursor: pointer; border-radius: 12px; transition: 0.2s; }
        .sidebar-item.active { background: #2563EB; color: white; box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3); }
        #loginOverlay { backdrop-filter: blur(8px); }
    </style>
</head>
<body class="min-h-screen">

    <div id="loginOverlay" class="fixed inset-0 bg-slate-900/60 z-50 flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-3xl shadow-2xl max-w-md w-full text-center">
            <h1 class="text-3xl font-black text-slate-800 mb-2">Treino<span class="text-blue-600">Flow</span></h1>
            <p class="text-slate-500 mb-8 text-sm">Insira seu código ou gere um novo acesso.</p>
            
            <input type="text" id="userCodeInput" placeholder="Ex: FLOW-XXXX" class="w-full p-4 bg-slate-100 rounded-xl border-2 border-transparent focus:border-blue-500 outline-none text-center font-mono text-xl mb-4 uppercase">
            
            <div class="flex flex-col gap-3">
                <button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition shadow-lg shadow-blue-200">ENTRAR</button>
                <button onclick="registrarNovo()" class="text-blue-600 font-bold text-sm hover:underline">NÃO TENHO CÓDIGO (GERAR NOVO)</button>
            </div>
        </div>
    </div>

    <div id="dashboard" class="hidden p-4 md:p-8">
        <header class="max-w-7xl mx-auto flex justify-between items-center mb-8">
            <div class="flex items-center gap-4">
                <div class="bg-blue-600 text-white p-2 rounded-lg font-bold">TF</div>
                <h1 class="text-xl font-black tracking-tight uppercase">Dashboard <span id="displayUserCode" class="text-blue-600 ml-2 font-mono"></span></h1>
            </div>
            <button onclick="logout()" class="text-slate-400 hover:text-red-500 text-sm font-bold uppercase tracking-widest">Sair</button>
        </header>

        <div class="max-w-7xl mx-auto grid lg:grid-cols-12 gap-8">
            
            <aside class="lg:col-span-3 space-y-4">
                <div class="card p-6">
                    <h3 class="text-xs font-black text-slate-400 uppercase mb-4 tracking-widest">Seus Exercícios</h3>
                    <div id="exerciseList" class="space-y-2"></div>
                    <div class="mt-6">
                        <input type="text" id="addExInput" placeholder="Nome do exercício" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm mb-2 outline-none focus:border-blue-400">
                        <button onclick="addExercise()" class="w-full text-blue-600 font-bold text-xs py-2 hover:bg-blue-50 rounded-lg transition">+ ADICIONAR NOVO</button>
                    </div>
                </div>
            </aside>

            <main class="lg:col-span-6 space-y-6">
                <div class="card p-8 bg-white border-b-8 border-blue-600 shadow-xl relative overflow-hidden">
                    <div class="absolute top-0 right-0 p-4 opacity-5 font-black text-6xl italic" id="bgText">FLOW</div>
                    <h2 id="activeExName" class="text-3xl font-black text-slate-800 mb-8 italic uppercase tracking-tighter">Selecione um Exercício</h2>
                    
                    <div class="grid grid-cols-3 gap-6 mb-8">
                        <div class="text-center">
                            <span class="block text-[10px] font-black text-slate-400 uppercase mb-2">Séries</span>
                            <input type="number" id="inputSets" value="4" class="w-full bg-slate-100 rounded-2xl p-4 text-2xl font-black text-center border-none">
                        </div>
                        <div class="text-center">
                            <span class="block text-[10px] font-black text-slate-400 uppercase mb-2">Reps</span>
                            <input type="number" id="inputReps" value="12" class="w-full bg-slate-100 rounded-2xl p-4 text-2xl font-black text-center border-none">
                        </div>
                        <div class="text-center">
                            <span class="block text-[10px] font-black text-slate-400 uppercase mb-2">Carga (kg)</span>
                            <input type="number" id="inputWeight" value="0" class="w-full bg-blue-600 text-white rounded-2xl p-4 text-2xl font-black text-center border-none shadow-lg shadow-blue-300">
                        </div>
                    </div>
                    
                    <div class="flex flex-col items-center">
                        <button onclick="saveWorkout()" class="bg-slate-900 text-white w-16 h-16 rounded-full flex items-center justify-center text-3xl shadow-xl hover:scale-110 active:scale-95 transition-all">
                            +
                        </button>
                        <p class="mt-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Registrar Treino</p>
                    </div>
                </div>

                <div class="card p-6 min-h-[350px]">
                    <h3 class="font-black text-slate-800 mb-6 flex items-center justify-between">
                        EVOLUÇÃO DE VOLUME
                        <span id="chartLabel" class="text-[10px] bg-blue-100 text-blue-700 px-3 py-1 rounded-full uppercase">Global</span>
                    </h3>
                    <canvas id="proChart"></canvas>
                </div>
            </main>

            <section class="lg:col-span-3">
                <div class="card h-full flex flex-col">
                    <div class="p-6 border-b border-slate-100 flex justify-between items-center">
                        <h3 class="font-black text-xs uppercase tracking-widest">Sessão de Hoje</h3>
                    </div>
                    <div id="todayHistory" class="flex-grow p-4 space-y-3 overflow-y-auto"></div>
                </div>
            </section>
        </div>
    </div>

    <script>
        let currentUser = null;
        let userData = { exercises: [], workouts: [] };
        let activeEx = "";
        let myChart;

        // --- SISTEMA DE ACESSO ---
        function registrarNovo() {
            const code = 'FLOW-' + Math.random().toString(36).substr(2, 4).toUpperCase();
            localStorage.setItem(code, JSON.stringify({ exercises: ['Supino', 'Agachamento'], workouts: [] }));
            document.getElementById('userCodeInput').value = code;
            alert("SEU NOVO CÓDIGO É: " + code + "\nGuarde-o para acessar seus dados!");
        }

        function login() {
            const code = document.getElementById('userCodeInput').value.trim().toUpperCase();
            const stored = localStorage.getItem(code);
            if(stored) {
                currentUser = code;
                userData = JSON.parse(stored);
                document.getElementById('loginOverlay').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                document.getElementById('displayUserCode').innerText = code;
                renderAll();
            } else {
                alert("Código não encontrado!");
            }
        }

        function logout() { location.reload(); }

        // --- LÓGICA DE TREINO ---
        function renderAll() {
            renderSidebar();
            renderHistory();
            updateChart();
            localStorage.setItem(currentUser, JSON.stringify(userData));
        }

        function renderSidebar() {
            const list = document.getElementById('exerciseList');
            list.innerHTML = userData.exercises.map(ex => `
                <div onclick="setActive('${ex}')" class="sidebar-item p-4 text-sm font-bold flex justify-between items-center ${activeEx === ex ? 'active' : 'hover:bg-slate-50'}">
                    ${ex} <span>→</span>
                </div>
            `).join('');
        }

        function setActive(ex) {
            activeEx = ex;
            document.getElementById('activeExName').innerText = ex;
            document.getElementById('bgText').innerText = ex.substring(0,4);
            renderSidebar();
            updateChart();
        }

        function addExercise() {
            const val = document.getElementById('addExInput').value;
            if(val) {
                userData.exercises.push(val);
                document.getElementById('addExInput').value = "";
                renderAll();
            }
        }

        function saveWorkout() {
            if(!activeEx) return alert("Selecione um exercício primeiro!");
            const entry = {
                ex: activeEx,
                s: parseInt(document.getElementById('inputSets').value),
                r: parseInt(document.getElementById('inputReps').value),
                w: parseFloat(document.getElementById('inputWeight').value),
                d: new Date().toISOString().split('T')[0]
            };
            userData.workouts.push(entry);
            renderAll();
        }

        function renderHistory() {
            const today = new Date().toISOString().split('T')[0];
            const list = document.getElementById('todayHistory');
            const filtered = userData.workouts.filter(w => w.d === today).reverse();
            
            list.innerHTML = filtered.map(w => `
                <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                    <div class="text-[10px] font-black text-blue-600 uppercase mb-1">${w.ex}</div>
                    <div class="flex justify-between items-end">
                        <span class="text-xs text-slate-500 font-bold">${w.s}x${w.r} @ ${w.w}kg</span>
                        <span class="font-black text-slate-800">${w.s * w.r * w.w}kg</span>
                    </div>
                </div>
            `).join('');
        }

        function updateChart() {
            const ctx = document.getElementById('proChart').getContext('2d');
            const dataToShow = activeEx ? userData.workouts.filter(w => w.ex === activeEx) : userData.workouts;
            
            // Agrupar volume por data
            const grouped = dataToShow.reduce((acc, w) => {
                acc[w.d] = (acc[w.d] || 0) + (w.s * w.r * w.w);
                return acc;
            }, {});

            const labels = Object.keys(grouped).sort();
            const values = labels.map(l => grouped[l]);

            if(myChart) myChart.destroy();
            
            const gradient = ctx.createLinearGradient(0, 0, 0, 400);
            gradient.addColorStop(0, 'rgba(37, 99, 235, 0.2)');
            gradient.addColorStop(1, 'rgba(37, 99, 235, 0)');

            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels.map(l => l.split('-').reverse().slice(0,2).join('/')),
                    datasets: [{
                        label: 'Volume Total',
                        data: values,
                        borderColor: '#2563EB',
                        borderWidth: 5,
                        pointBackgroundColor: '#fff',
                        pointBorderColor: '#2563EB',
                        pointRadius: 6,
                        pointHoverRadius: 8,
                        fill: true,
                        backgroundColor: gradient,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { color: '#F1F5F9' }, ticks: { font: { weight: 'bold' } } },
                        x: { grid: { display: false }, ticks: { font: { weight: 'bold' } } }
                    }
                }
            });
            document.getElementById('chartLabel').innerText = activeEx || "GLOBAL";
        }
    </script>
</body>
</html>
