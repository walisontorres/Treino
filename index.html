<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treino Flow - Evolução de Carga</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #F4F7F6; } /* Tom White Gelo */
        .card { background-color: #FFFFFF; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="p-4 md:p-8 font-sans text-slate-700">

    <div class="max-w-5xl mx-auto">
        <header class="mb-8 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-slate-800">Treino<span class="text-blue-600">Flow</span></h1>
            <button class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition">Novo Registro</button>
        </header>

        <div class="grid md:grid-cols-3 gap-6">
            <div class="card p-6 md:col-span-1 border-t-4 border-blue-500">
                <h2 class="text-lg font-semibold mb-4 text-slate-800">Registrar Carga</h2>
                <form id="workoutForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">Exercício</label>
                        <input type="text" id="exercise" placeholder="Ex: Supino Reto" class="w-full p-2 border border-slate-200 rounded-md focus:ring-2 focus:ring-blue-400 outline-none">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-sm font-medium mb-1">Carga (kg)</label>
                            <input type="number" id="weight" class="w-full p-2 border border-slate-200 rounded-md">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Data</label>
                            <input type="date" id="date" class="w-full p-2 border border-slate-200 rounded-md text-sm">
                        </div>
                    </div>
                    <button type="submit" class="w-full bg-slate-800 text-white py-2 rounded-md hover:bg-slate-900 transition mt-2">Salvar Entrada</button>
                </form>
            </div>

            <div class="card p-6 md:col-span-2">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-lg font-semibold text-slate-800">Evolução de Intensidade</h2>
                    <select class="text-sm border-none bg-slate-100 rounded p-1 outline-none text-blue-600 font-medium">
                        <option>Últimos 30 dias</option>
                        <option>Este ano</option>
                    </select>
                </div>
                <div class="h-64">
                    <canvas id="evolutionChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Configuração do Gráfico
        const ctx = document.getElementById('evolutionChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['01/03', '05/03', '10/03', '15/03', '20/03', '25/03'],
                datasets: [{
                    label: 'Volume de Carga (kg)',
                    data: [80, 85, 82, 90, 95, 100],
                    borderColor: '#2563eb', // Azul
                    backgroundColor: 'rgba(37, 99, 235, 0.1)',
                    fill: true,
                    tension: 0.4,
                    borderWidth: 3,
                    pointRadius: 4,
                    pointBackgroundColor: '#2563eb'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { beginAtZero: false, grid: { color: '#e2e8f0' } },
                    x: { grid: { display: false } }
                }
            }
        });
    </script>
</body>
</html>
